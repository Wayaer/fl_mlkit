name: example
description: Demonstrates how to use the fl_camera plugin.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.7.0 <4.0.0"
  flutter: '>=3.29.0'

dependencies:
  flutter:
    sdk: flutter
  fl_camera:
    path: ../
  fl_extended: ^3.3.0
  permission_handler: ^12.0.1

dev_dependencies:
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true